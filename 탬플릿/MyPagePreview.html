<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MyPage Preview</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=Pretendard:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: #f8f7f4; font-family: 'Pretendard', sans-serif; }

  /* ── Header ── */
  .header {
    width: 1200px;
    margin: 0 auto;
    height: 70px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 0 0;
    border-bottom: 1px solid rgba(0,0,0,0.08);
    background: #fff;
    position: sticky;
    top: 0;
    z-index: 100;
    padding: 0 32px;
  }
  .logo {
    font-family: 'DM Serif Display', serif;
    font-size: 1.5rem;
    color: #1a1a2e;
    letter-spacing: 0.04em;
  }
  .logo span { color: #c9a96e; }
  .header-nav { display: flex; gap: 24px; align-items: center; }
  .header-nav a {
    font-size: 0.82rem;
    color: #555;
    text-decoration: none;
    letter-spacing: 0.03em;
    transition: color 0.2s;
  }
  .header-nav a:hover { color: #1a1a2e; }
  .header-nav .btn {
    background: #1a1a2e;
    color: #fff;
    padding: 8px 18px;
    border-radius: 6px;
    font-size: 0.8rem;
    letter-spacing: 0.04em;
  }

  /* ── Layout ── */
  .outer { width: 1200px; margin: 0 auto; }
  .main { display: flex; min-height: calc(100vh - 70px); }

  /* ── Sidebar ── */
  .side {
    width: 220px;
    flex-shrink: 0;
    background: #1a1a2e;
    position: sticky;
    top: 70px;
    height: calc(100vh - 70px);
    overflow-y: auto;
    display: flex;
    flex-direction: column;
    padding: 36px 0;
  }
  .side::before {
    content: '';
    display: block;
    width: 40px;
    height: 3px;
    background: linear-gradient(90deg, #c9a96e, #e8c98a);
    margin: 0 20px 28px;
    border-radius: 2px;
  }
  .side-section { padding: 0 20px; }
  .side-section + .side-section {
    margin-top: 32px;
    padding-top: 24px;
    border-top: 1px solid rgba(255,255,255,0.07);
  }
  .side h5 {
    font-family: 'DM Serif Display', serif;
    font-size: 0.62rem;
    font-weight: 400;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    color: #c9a96e;
    margin-bottom: 14px;
  }
  .side ul { list-style: none; }
  .side li p {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 12px 14px;
    font-size: 0.875rem;
    color: rgba(255,255,255,0.55);
    cursor: pointer;
    border-radius: 8px;
    margin: 2px 0;
    transition: all 0.22s ease;
    position: relative;
  }
  .side li p::before {
    content: '';
    width: 5px; height: 5px;
    border-radius: 50%;
    background: rgba(255,255,255,0.2);
    flex-shrink: 0;
    transition: all 0.22s ease;
  }
  .side li p:hover,
  .side li.active p {
    background: rgba(201,169,110,0.1);
    color: #e8c98a;
    padding-left: 18px;
  }
  .side li p:hover::before,
  .side li.active p::before {
    background: #c9a96e;
    box-shadow: 0 0 6px rgba(201,169,110,0.5);
  }
  .side li.active p { font-weight: 500; }
  .side-footer {
    margin-top: auto;
    padding: 0 20px;
    font-size: 0.58rem;
    letter-spacing: 0.25em;
    color: rgba(255,255,255,0.12);
    font-family: 'DM Serif Display', serif;
  }

  /* ── Content ── */
  .content {
    flex: 1;
    padding: 40px 48px;
    background: #f8f7f4;
  }
  .content-title {
    font-family: 'DM Serif Display', serif;
    font-size: 1.9rem;
    color: #1a1a2e;
    margin-bottom: 6px;
    letter-spacing: 0.01em;
  }
  .content-sub {
    font-size: 0.82rem;
    color: #999;
    margin-bottom: 36px;
    letter-spacing: 0.02em;
  }

  /* Cart items */
  .cart-item {
    background: #fff;
    border-radius: 14px;
    padding: 20px 24px;
    display: flex;
    align-items: center;
    gap: 20px;
    margin-bottom: 14px;
    border: 1px solid rgba(0,0,0,0.05);
    transition: box-shadow 0.2s, transform 0.2s;
  }
  .cart-item:hover {
    box-shadow: 0 8px 28px rgba(0,0,0,0.07);
    transform: translateY(-1px);
  }
  .cart-thumb {
    width: 64px; height: 80px;
    background: linear-gradient(135deg, #e8e0d4, #d5c9bb);
    border-radius: 8px;
    flex-shrink: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 1.6rem;
  }
  .cart-info { flex: 1; }
  .cart-info h4 { font-size: 0.95rem; color: #1a1a2e; font-weight: 500; margin-bottom: 4px; }
  .cart-info p { font-size: 0.8rem; color: #aaa; }
  .cart-price { font-family: 'DM Serif Display', serif; font-size: 1.1rem; color: #1a1a2e; }
  .cart-remove {
    width: 32px; height: 32px;
    border: 1px solid rgba(0,0,0,0.1);
    border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    cursor: pointer;
    font-size: 0.7rem;
    color: #bbb;
    transition: all 0.2s;
  }
  .cart-remove:hover { border-color: #e05; color: #e05; background: #fff0f0; }

  /* Summary */
  .summary {
    background: #1a1a2e;
    border-radius: 14px;
    padding: 28px 28px;
    margin-top: 28px;
    display: flex;
    align-items: center;
    justify-content: space-between;
  }
  .summary-label { font-size: 0.82rem; color: rgba(255,255,255,0.5); letter-spacing: 0.06em; text-transform: uppercase; margin-bottom: 4px; }
  .summary-amount { font-family: 'DM Serif Display', serif; font-size: 1.8rem; color: #e8c98a; }
  .buy-btn {
    background: linear-gradient(135deg, #c9a96e, #e8c98a);
    color: #1a1a2e;
    border: none;
    padding: 14px 36px;
    border-radius: 10px;
    font-size: 0.9rem;
    font-weight: 600;
    cursor: pointer;
    letter-spacing: 0.04em;
    transition: opacity 0.2s, transform 0.2s;
  }
  .buy-btn:hover { opacity: 0.9; transform: scale(0.98); }

  /* Scroll animation */
  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(20px); }
    to { opacity: 1; transform: translateY(0); }
  }
  .cart-item { animation: fadeUp 0.4s ease both; }
  .cart-item:nth-child(1) { animation-delay: 0.05s; }
  .cart-item:nth-child(2) { animation-delay: 0.12s; }
  .cart-item:nth-child(3) { animation-delay: 0.19s; }
</style>
</head>
<body>

<!-- 전체 wrapper (실제에서는 1200px 컨테이너) -->

    <aside class="side">

      <div class="summary">

    </main>

  </div>
</div>

</body>
</html>
