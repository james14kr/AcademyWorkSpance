<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Document</title>
  <!-- css, js 파일은 resources/static 폴더를 기준으로 검색 -->
  <link rel="stylesheet" href="/css/board_list.css">
</head>
<body>
  게시글 목록 페이지
  <div th:text="${data}"></div>
  <div>[[${ageData}]]</div>
  <div th:text="${boardList}"></div>

  <div>
    <table class="list-table">
      <thead>
        <tr>
          <td>글번호</td>
          <td>제목</td>
          <td>작성자</td>
          <td>작성일</td>
        </tr>
      </thead>
      <tbody>
        <!-- 리스트가 비었다면 -->
        <th:block th:if="${#lists.isEmpty(boardList)}">
          <tr>
            <td colspan="4">등록된 게시글이 없습니다.</td>
          </tr>
        </th:block>        

        <!-- 리스트에 데이터가 있다면 -->
        <th:block th:unless="${#lists.isEmpty(boardList)}">
          <tr th:each="board : ${boardList}">
            <td>[[${board.boardNum}]]</td>
            <td th:text="${board.title}"></td>
            <td>[[${board.writer}]]</td>
            <td>[[${#temporals.format(board.regDate, 'yyyy-MM-dd HH:mm')}]]</td>
          </tr>
        </th:block>
      </tbody>
    </table>

    <div>
      <button type="button" onclick="goWrite()">글 쓰기</button>
    </div>
  </div>

  <script src="/js/board_list.js"></script>
</body>
</html>
